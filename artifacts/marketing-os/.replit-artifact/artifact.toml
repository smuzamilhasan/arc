kind = "web"
previewPath = "/marketing-os/"
title = "Marketing OS"
version = "1.0.0"
id = "artifacts/marketing-os"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/marketing-os/" ]
localPort = 23624

[services.development]
run = "pnpm --filter @workspace/marketing-os run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/marketing-os", "run", "build" ]
publicDir = "artifacts/marketing-os/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23624"
BASE_PATH = "/marketing-os/"
