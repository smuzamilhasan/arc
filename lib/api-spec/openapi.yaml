openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: arc — Personal Brand Strategy API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: client
    description: Client profile operations
  - name: audit
    description: Digital presence audit operations
  - name: narrative
    description: Narrative development operations
  - name: portrait
    description: AI-synthesized foundational profile portrait
  - name: posts
    description: Content post operations
  - name: ideas
    description: Content idea operations
  - name: connections
    description: Per-client connections to third-party scheduling tools
  - name: dashboard
    description: Dashboard summary operations
  - name: onboarding
    description: Onboarding intake operations
  - name: admin
    description: Admin operations (view all users and their data)
  - name: assistant
    description: Master assistant chat that proposes confirm-before-apply edits
  - name: planner
    description: Planner agent — turns the approved strategy into a weekly content calendar and ideas backlog
  - name: manager
    description: Manager — orchestrates the agent team from one high-level instruction
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /client:
    get:
      operationId: getClient
      tags: [client]
      summary: Get client profile
      responses:
        "200":
          description: Client profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientProfile"
        "404":
          description: Not found
    put:
      operationId: upsertClient
      tags: [client]
      summary: Create or update client profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClientProfileInput"
      responses:
        "200":
          description: Updated client profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientProfile"

  /client/reset:
    post:
      operationId: resetClient
      tags: [client]
      summary: Delete the client profile and all derived data (start over)
      description: Permanently removes the client profile along with its audit results, narrative, posts, and ideas, returning the app to a brand-new state.
      responses:
        "204":
          description: Reset complete

  /client/foundation-ack:
    post:
      operationId: ackFoundationConsolidation
      tags: [client]
      summary: Acknowledge the one-time foundation consolidation celebration
      description: Sets foundationConsolidatedAck to true so the consolidation celebration modal never shows again.
      responses:
        "200":
          description: Updated client profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientProfile"

  /account:
    delete:
      operationId: deleteAccount
      tags: [client]
      summary: Permanently delete the user's account and all associated data
      description: Deletes the client profile along with its audit results, narrative, posts, and ideas, then removes the user's authentication account. This cannot be undone.
      responses:
        "204":
          description: Account deleted

  /audit/latest:
    get:
      operationId: getLatestAudit
      tags: [audit]
      summary: Get the most recent audit result
      responses:
        "200":
          description: Latest audit result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditResult"
        "404":
          description: No audit yet

  /audit/run:
    post:
      operationId: runAudit
      tags: [audit]
      summary: Run a digital presence audit (SSE stream)
      description: Streams progress events via Server-Sent Events, then persists and returns the result. Consume with fetch + ReadableStream, not generated hooks.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuditRunInput"
      responses:
        "200":
          description: SSE stream of audit progress
          content:
            text/event-stream:
              schema:
                type: string

  /audit/refresh-status:
    get:
      operationId: getAuditRefreshStatus
      tags: [audit]
      summary: Whether a background audit refresh is currently running for the user
      responses:
        "200":
          description: Refresh status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditRefreshStatus"

  /audit/auto-refresh:
    post:
      operationId: autoRefreshAudit
      tags: [audit]
      summary: Start a background audit refresh if the latest audit is stale
      description: Triggered on sign-in. If the client already has at least one audit that is 14+ days old and no audit is currently running, a fresh audit starts in the background and the response indicates it was started. Otherwise nothing is started. Never starts the first-ever audit.
      responses:
        "200":
          description: Whether a refresh was started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditAutoRefreshResult"

  /dossier:
    get:
      operationId: getDossier
      tags: [dossier]
      summary: Get the latest briefing dossier
      responses:
        "200":
          description: Briefing dossier
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BriefingDossier"
        "404":
          description: Not found

  /dossier/generate:
    post:
      operationId: generateDossier
      tags: [dossier]
      summary: Research the client and competitors into a briefing dossier
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DossierGenerateInput"
      responses:
        "200":
          description: Generated briefing dossier
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BriefingDossier"
        "404":
          description: No client profile yet
        "502":
          description: Generation failed

  /narrative:
    get:
      operationId: getNarrative
      tags: [narrative]
      summary: Get the narrative profile
      responses:
        "200":
          description: Narrative profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NarrativeProfile"
        "404":
          description: Not found
    put:
      operationId: updateNarrative
      tags: [narrative]
      summary: Update the editable fields of the narrative profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NarrativeUpdateInput"
      responses:
        "200":
          description: Updated narrative profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NarrativeProfile"
        "404":
          description: Not found

  /narrative/generate:
    post:
      operationId: generateNarrative
      tags: [narrative]
      summary: Generate a narrative from industry questionnaire answers
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NarrativeGenerateInput"
      responses:
        "200":
          description: Generated narrative profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NarrativeProfile"

  /portrait:
    get:
      operationId: getPortrait
      tags: [portrait]
      summary: Get the synthesized foundational profile portrait
      responses:
        "200":
          description: Profile portrait
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProfilePortrait"
        "404":
          description: Not found

  /portrait/generate:
    post:
      operationId: generatePortrait
      tags: [portrait]
      summary: Generate (or regenerate) the foundational profile portrait from the current profile
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PortraitGenerateInput"
      responses:
        "200":
          description: Generated profile portrait
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProfilePortrait"
        "404":
          description: Not found

  /platforms:
    get:
      operationId: getPlatforms
      tags: [platforms]
      summary: Get the platform strategy
      responses:
        "200":
          description: Platform strategy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlatformStrategy"
        "404":
          description: Not found
    put:
      operationId: updatePlatforms
      tags: [platforms]
      summary: Update the editable text fields of the platform strategy
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlatformsUpdateInput"
      responses:
        "200":
          description: Updated platform strategy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlatformStrategy"
        "404":
          description: Not found

  /platforms/generate:
    post:
      operationId: generatePlatforms
      tags: [platforms]
      summary: Generate a platform strategy from the completed blueprint
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlatformsGenerateInput"
      responses:
        "200":
          description: Generated platform strategy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlatformStrategy"
        "403":
          description: Blueprint incomplete
        "404":
          description: No client profile yet
        "502":
          description: Generation failed

  /industry-overview:
    get:
      operationId: getIndustryOverview
      tags: [industryOverview]
      summary: Get the latest industry overview
      responses:
        "200":
          description: Industry overview
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IndustryOverview"
        "404":
          description: Not found

  /industry-overview/generate:
    post:
      operationId: generateIndustryOverview
      tags: [industryOverview]
      summary: Research the client's industry landscape into an industry overview
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IndustryOverviewGenerateInput"
      responses:
        "200":
          description: Generated industry overview
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IndustryOverview"
        "403":
          description: Foundation incomplete
        "404":
          description: No client profile yet
        "502":
          description: Generation failed

  /content-strategy:
    get:
      operationId: getContentStrategy
      tags: [contentStrategy]
      summary: Get the content strategy
      responses:
        "200":
          description: Content strategy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContentStrategy"
        "404":
          description: Not found
    put:
      operationId: updateContentStrategy
      tags: [contentStrategy]
      summary: Update the editable text fields of the content strategy
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContentStrategyUpdateInput"
      responses:
        "200":
          description: Updated content strategy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContentStrategy"
        "404":
          description: Not found

  /content-strategy/generate:
    post:
      operationId: generateContentStrategy
      tags: [contentStrategy]
      summary: Generate a content strategy from the blueprint and platform strategy
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContentStrategyGenerateInput"
      responses:
        "200":
          description: Generated content strategy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContentStrategy"
        "403":
          description: Blueprint or platform strategy incomplete
        "404":
          description: No client profile yet
        "502":
          description: Generation failed

  /planner/generate:
    post:
      operationId: generateContentPlan
      tags: [planner]
      summary: Propose a weekly content calendar from the approved strategy
      description: Reads the narrative, content strategy, and platform strategy and proposes a calendar of content slots plus new backlog ideas. Nothing is persisted — the client confirms via /planner/apply.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContentPlanGenerateInput"
      responses:
        "200":
          description: Proposed content plan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContentPlanProposal"
        "403":
          description: Blueprint or content strategy incomplete
        "404":
          description: No client profile yet
        "502":
          description: Planning failed

  /planner/apply:
    post:
      operationId: applyContentPlan
      tags: [planner]
      summary: Commit a confirmed content plan into scheduled posts and backlog ideas
      description: Persists the confirmed slots as scheduled draft posts and the confirmed ideas into the backlog. Human-in-the-loop — only called after the client reviews the proposal.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContentPlanApplyInput"
      responses:
        "200":
          description: The created posts and ideas
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContentPlanApplyResult"
        "404":
          description: No client profile yet

  /manager/run:
    post:
      operationId: runManager
      tags: [manager]
      summary: Orchestrate the agent team from one high-level instruction
      description: Breaks a single client instruction into an ordered set of delegated tasks, routes each to the right specialist agent (Investigator, Strategist, Planner, Ghostwriter) in research -> strategy -> planning -> writing order, runs them so each reads the latest upstream output, and returns the run with each task's status and outputs. Bounded — at most one task per agent. Outputs that change anything stay un-applied and are confirmed by the client through the existing per-agent surfaces.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ManagerRunInput"
      responses:
        "200":
          description: The completed Manager run
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ManagerRun"
        "400":
          description: Missing or invalid instruction
        "404":
          description: No client profile yet
        "429":
          description: Rate limited or a run is already in flight
        "502":
          description: The Manager could not break down the instruction

  /manager/runs:
    get:
      operationId: listManagerRuns
      tags: [manager]
      summary: List past Manager runs for the client, newest first
      responses:
        "200":
          description: Manager runs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ManagerRun"
        "404":
          description: No client profile yet

  /onboarding/extract:
    post:
      operationId: extractPublicInfo
      tags: [onboarding]
      summary: Gather publicly available info about the person from their name and links
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExtractInfoInput"
      responses:
        "200":
          description: Extracted public info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExtractInfoResult"

  /onboarding/generate-bio:
    post:
      operationId: generateBio
      tags: [onboarding]
      summary: Generate a professional headline and short bio from intake material
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateBioInput"
      responses:
        "200":
          description: Generated headline and bio
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenerateBioResult"

  /onboarding/draft-pillar:
    post:
      operationId: draftPillar
      tags: [onboarding]
      summary: Draft tentative answers for a Blueprint pillar from existing intake material
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DraftPillarInput"
      responses:
        "200":
          description: Drafted field values keyed by field name
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DraftPillarResult"

  /onboarding/pillar-examples:
    post:
      operationId: generatePillarExamples
      tags: [onboarding]
      summary: Generate industry-tailored illustrative example answers for a Blueprint pillar's fields
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GeneratePillarExamplesInput"
      responses:
        "200":
          description: Illustrative example strings keyed by field name
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GeneratePillarExamplesResult"

  /posts:
    get:
      operationId: listPosts
      tags: [posts]
      summary: List all posts
      parameters:
        - name: platform
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of posts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Post"
    post:
      operationId: createPost
      tags: [posts]
      summary: Create a post
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PostInput"
      responses:
        "201":
          description: Created post
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Post"

  /posts/schedule-batch:
    post:
      operationId: scheduleBatchPosts
      tags: [posts]
      summary: Schedule a batch of posts across dates
      description: Assigns target dates to several posts at once, spreading them from a start date by a fixed day interval, and marks each as scheduled.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ScheduleBatchInput"
      responses:
        "200":
          description: The updated posts after scheduling
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Post"
        "400":
          description: Invalid input
        "404":
          description: No client profile yet

  /posts/draft:
    post:
      operationId: draftPosts
      tags: [posts]
      summary: Draft platform-appropriate copy in the client's voice (Ghostwriter)
      description: Generates one or more editable content drafts (post, hook, or article) grounded in the client's narrative, voice/tone, and profile. Drafts are returned for review and are NOT persisted; the client edits and saves the ones they want via the normal create-post route.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DraftPostsInput"
      responses:
        "200":
          description: Generated drafts for review
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DraftPostsResult"
        "400":
          description: Invalid input
        "404":
          description: No client profile yet
        "502":
          description: Generation failed

  /posts/{id}:
    get:
      operationId: getPost
      tags: [posts]
      summary: Get a post by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Post
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Post"
        "404":
          description: Not found
    patch:
      operationId: updatePost
      tags: [posts]
      summary: Update a post
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PostUpdate"
      responses:
        "200":
          description: Updated post
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Post"
        "404":
          description: Not found
    delete:
      operationId: deletePost
      tags: [posts]
      summary: Delete a post
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

  /posts/{id}/handoff:
    post:
      operationId: handoffPost
      tags: [posts]
      summary: Push a single post into the client's connected scheduler
      description: Sends the post's content (and schedule date, if any) to the client's own connected third-party scheduler. arc never publishes directly. Records the hand-off state on the post.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HandoffInput"
      responses:
        "200":
          description: The post after a successful hand-off
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Post"
        "400":
          description: Invalid input
        "404":
          description: Post not found
        "409":
          description: No scheduler connected for that provider
        "502":
          description: The scheduler rejected the post

  /posts/handoff-batch:
    post:
      operationId: handoffBatchPosts
      tags: [posts]
      summary: Push several posts into the client's connected scheduler
      description: Hands off a batch of posts at once. Returns a per-post result so partial failures are visible, plus the updated posts.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HandoffBatchInput"
      responses:
        "200":
          description: Per-post hand-off results and the updated posts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HandoffBatchResult"
        "400":
          description: Invalid input
        "404":
          description: No client profile yet
        "409":
          description: No scheduler connected for that provider

  /connections:
    get:
      operationId: listConnections
      tags: [connections]
      summary: List the client's connected schedulers
      description: Returns connection status per provider. Never returns the stored API key.
      responses:
        "200":
          description: Connected schedulers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SchedulerConnection"
    post:
      operationId: saveConnection
      tags: [connections]
      summary: Connect (or update) a scheduler by verifying and storing an API key
      description: Verifies the API key against the provider, then stores it encrypted at rest. Returns the connection status without the key. Fails with 400 if the key is invalid.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SaveConnectionInput"
      responses:
        "200":
          description: The saved connection status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SchedulerConnection"
        "400":
          description: Invalid key or input
        "404":
          description: No client profile yet

  /connections/providers:
    get:
      operationId: listSchedulerProviders
      tags: [connections]
      summary: List supported scheduler providers
      responses:
        "200":
          description: Supported providers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SchedulerProviderMeta"

  /connections/{provider}:
    delete:
      operationId: deleteConnection
      tags: [connections]
      summary: Disconnect a scheduler and remove its stored key
      parameters:
        - name: provider
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Disconnected
        "404":
          description: Not connected

  /ideas:
    get:
      operationId: listIdeas
      tags: [ideas]
      summary: List content ideas
      responses:
        "200":
          description: List of ideas
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Idea"
    post:
      operationId: createIdea
      tags: [ideas]
      summary: Create a content idea
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IdeaInput"
      responses:
        "201":
          description: Created idea
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Idea"

  /ideas/{id}:
    delete:
      operationId: deleteIdea
      tags: [ideas]
      summary: Delete a content idea
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
    patch:
      operationId: updateIdea
      tags: [ideas]
      summary: Update a content idea
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IdeaUpdate"
      responses:
        "200":
          description: Updated idea
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Idea"

  /dashboard:
    get:
      operationId: getDashboard
      tags: [dashboard]
      summary: Get dashboard summary
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /admin/access:
    get:
      operationId: getAdminAccess
      tags: [admin]
      summary: Whether the current user has admin access
      responses:
        "200":
          description: Admin access flag
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminAccess"

  /admin/users:
    get:
      operationId: listAdminUsers
      tags: [admin]
      summary: List all users with a summary of their data (admin only)
