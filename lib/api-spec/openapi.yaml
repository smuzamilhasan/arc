openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: arc — Personal Brand Strategy API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: client
    description: Client profile operations
  - name: audit
    description: Digital presence audit operations
  - name: narrative
    description: Narrative development operations
  - name: posts
    description: Content post operations
  - name: ideas
    description: Content idea operations
  - name: dashboard
    description: Dashboard summary operations
  - name: onboarding
    description: Onboarding intake operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /client:
    get:
      operationId: getClient
      tags: [client]
      summary: Get client profile
      responses:
        "200":
          description: Client profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientProfile"
        "404":
          description: Not found
    put:
      operationId: upsertClient
      tags: [client]
      summary: Create or update client profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClientProfileInput"
      responses:
        "200":
          description: Updated client profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientProfile"

  /client/reset:
    post:
      operationId: resetClient
      tags: [client]
      summary: Delete the client profile and all derived data (start over)
      description: Permanently removes the client profile along with its audit results, narrative, posts, and ideas, returning the app to a brand-new state.
      responses:
        "204":
          description: Reset complete

  /account:
    delete:
      operationId: deleteAccount
      tags: [client]
      summary: Permanently delete the user's account and all associated data
      description: Deletes the client profile along with its audit results, narrative, posts, and ideas, then removes the user's authentication account. This cannot be undone.
      responses:
        "204":
          description: Account deleted

  /audit/latest:
    get:
      operationId: getLatestAudit
      tags: [audit]
      summary: Get the most recent audit result
      responses:
        "200":
          description: Latest audit result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditResult"
        "404":
          description: No audit yet

  /audit/run:
    post:
      operationId: runAudit
      tags: [audit]
      summary: Run a digital presence audit (SSE stream)
      description: Streams progress events via Server-Sent Events, then persists and returns the result. Consume with fetch + ReadableStream, not generated hooks.
      responses:
        "200":
          description: SSE stream of audit progress
          content:
            text/event-stream:
              schema:
                type: string

  /narrative:
    get:
      operationId: getNarrative
      tags: [narrative]
      summary: Get the narrative profile
      responses:
        "200":
          description: Narrative profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NarrativeProfile"
        "404":
          description: Not found

  /narrative/generate:
    post:
      operationId: generateNarrative
      tags: [narrative]
      summary: Generate a narrative from industry questionnaire answers
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NarrativeGenerateInput"
      responses:
        "200":
          description: Generated narrative profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NarrativeProfile"

  /onboarding/extract:
    post:
      operationId: extractPublicInfo
      tags: [onboarding]
      summary: Gather publicly available info about the person from their name and links
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExtractInfoInput"
      responses:
        "200":
          description: Extracted public info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExtractInfoResult"

  /onboarding/generate-bio:
    post:
      operationId: generateBio
      tags: [onboarding]
      summary: Generate a professional headline and short bio from intake material
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateBioInput"
      responses:
        "200":
          description: Generated headline and bio
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenerateBioResult"

  /posts:
    get:
      operationId: listPosts
      tags: [posts]
      summary: List all posts
      parameters:
        - name: platform
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of posts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Post"
    post:
      operationId: createPost
      tags: [posts]
      summary: Create a post
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PostInput"
      responses:
        "201":
          description: Created post
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Post"

  /posts/{id}:
    get:
      operationId: getPost
      tags: [posts]
      summary: Get a post by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Post
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Post"
        "404":
          description: Not found
    patch:
      operationId: updatePost
      tags: [posts]
      summary: Update a post
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PostUpdate"
      responses:
        "200":
          description: Updated post
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Post"
        "404":
          description: Not found
    delete:
      operationId: deletePost
      tags: [posts]
      summary: Delete a post
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

  /ideas:
    get:
      operationId: listIdeas
      tags: [ideas]
      summary: List content ideas
      responses:
        "200":
          description: List of ideas
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Idea"
    post:
      operationId: createIdea
      tags: [ideas]
      summary: Create a content idea
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IdeaInput"
      responses:
        "201":
          description: Created idea
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Idea"

  /ideas/{id}:
    delete:
      operationId: deleteIdea
      tags: [ideas]
      summary: Delete a content idea
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
    patch:
      operationId: updateIdea
      tags: [ideas]
      summary: Update a content idea
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IdeaUpdate"
      responses:
        "200":
          description: Updated idea
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Idea"

  /dashboard:
    get:
      operationId: getDashboard
      tags: [dashboard]
      summary: Get dashboard summary
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ClientProfile:
      type: object
      required: [id, fullName, location, headline, currentRole, company, industry, yearsExperience, achievements, goals, bio, placeOfBirth, earlyLife, schooling, university, professionalJourney, signatureAchievements, awards, quantifiableResults, audienceImpact, passions, beliefs, frustrations, desiredChange, extractedInfo, onboardingComplete, createdAt, updatedAt]
      properties:
        id:
          type: integer
        fullName:
          type: string
        location:
          type: string
        headline:
          type: string
        currentRole:
          type: string
        company:
          type: string
        industry:
          type: string
        yearsExperience:
          type: integer
        achievements:
          type: array
          items:
            type: string
        goals:
          type: string
        bio:
          type: string
        dateOfBirth:
          type: ["string", "null"]
        placeOfBirth:
          type: string
        earlyLife:
          type: string
        schooling:
          type: string
        university:
          type: string
        professionalJourney:
          type: string
        signatureAchievements:
          type: string
        awards:
          type: string
        quantifiableResults:
          type: string
        audienceImpact:
          type: string
        passions:
          type: string
        beliefs:
          type: string
        frustrations:
          type: string
        desiredChange:
          type: string
        extractedInfo:
          type: string
        website:
          type: ["string", "null"]
        newsletter:
          type: ["string", "null"]
        linkedinUrl:
          type: ["string", "null"]
        twitterUrl:
          type: ["string", "null"]
        instagramUrl:
          type: ["string", "null"]
        youtubeUrl:
          type: ["string", "null"]
        onboardingComplete:
          type: boolean
        createdAt:
          type: string
        updatedAt:
          type: string

    ClientProfileInput:
      type: object
      required: [fullName]
      properties:
        fullName:
          type: string
        location:
          type: string
        headline:
          type: string
        currentRole:
          type: string
        company:
          type: string
        industry:
          type: string
        yearsExperience:
          type: integer
        achievements:
          type: array
          items:
            type: string
        goals:
          type: string
        bio:
          type: string
        dateOfBirth:
          type: string
        placeOfBirth:
          type: string
        earlyLife:
          type: string
        schooling:
          type: string
        university:
          type: string
        professionalJourney:
          type: string
        signatureAchievements:
          type: string
        awards:
          type: string
        quantifiableResults:
          type: string
        audienceImpact:
          type: string
        passions:
          type: string
        beliefs:
          type: string
        frustrations:
          type: string
        desiredChange:
          type: string
        extractedInfo:
          type: string
        website:
          type: string
        newsletter:
          type: string
        linkedinUrl:
          type: string
        twitterUrl:
          type: string
        instagramUrl:
          type: string
        youtubeUrl:
          type: string
        onboardingComplete:
          type: boolean

    ExtractInfoInput:
      type: object
      required: [fullName]
      properties:
        fullName:
          type: string
        linkedinUrl:
          type: string
        website:
          type: string
        twitterUrl:
          type: string
        company:
          type: string

    ExtractedSource:
      type: object
      required: [title, url]
      properties:
        title:
          type: string
        url:
          type: string

    ExtractInfoResult:
      type: object
      required: [summary, highlights, sources]
      properties:
        summary:
          type: string
        highlights:
          type: array
          items:
            type: string
        sources:
          type: array
          items:
            $ref: "#/components/schemas/ExtractedSource"

    GenerateBioInput:
      type: object
      required: [fullName]
      properties:
        fullName:
          type: string
        currentRole:
          type: string
        company:
          type: string
        industry:
          type: string
        signatureAchievements:
          type: string
        awards:
          type: string
        quantifiableResults:
          type: string
        audienceImpact:
          type: string
        professionalJourney:
          type: string
        extractedInfo:
          type: string

    GenerateBioResult:
      type: object
      required: [headline, bio]
      properties:
        headline:
          type: string
        bio:
          type: string

    SeoFinding:
      type: object
      required: [title, url, type, snippet]
      properties:
        title:
          type: string
        url:
          type: string
        type:
          type: string
          enum: [owned, social, press, directory, other]
        snippet:
          type: string

    SeoFindings:
      type: object
      required: [resultCount, results, ownedPresence, summary]
      properties:
        resultCount:
          type: integer
        results:
          type: array
          items:
            $ref: "#/components/schemas/SeoFinding"
        ownedPresence:
          type: boolean
        summary:
          type: string

    GeoModelResult:
      type: object
      required: [model, label, mentioned, accuracy, response, notes]
      properties:
        model:
          type: string
        label:
          type: string
        mentioned:
          type: boolean
        accuracy:
          type: string
          enum: [accurate, partial, none, incorrect]
        response:
          type: string
        notes:
          type: string

    GeoFindings:
      type: object
      required: [models, summary]
      properties:
        models:
          type: array
          items:
            $ref: "#/components/schemas/GeoModelResult"
        summary:
          type: string

    AuditResult:
      type: object
      required: [id, clientId, seoScore, geoScore, recommendations, status, createdAt]
      properties:
        id:
          type: integer
        clientId:
          type: integer
        seoScore:
          type: integer
        geoScore:
          type: integer
        seoFindings:
          oneOf:
            - $ref: "#/components/schemas/SeoFindings"
            - type: "null"
        geoFindings:
          oneOf:
            - $ref: "#/components/schemas/GeoFindings"
            - type: "null"
        recommendations:
          type: array
          items:
            type: string
        status:
          type: string
        createdAt:
          type: string

    NarrativeTheme:
      type: object
      required: [title, description]
      properties:
        title:
          type: string
        description:
          type: string

    PlatformRecommendation:
      type: object
      required: [platform, reason, priority]
      properties:
        platform:
          type: string
        reason:
          type: string
        priority:
          type: string
          enum: [high, medium, low]

    IndustryAnswer:
      type: object
      required: [question, answer]
      properties:
        question:
          type: string
        answer:
          type: string

    NarrativeProfile:
      type: object
      required: [id, clientId, industryAnswers, coreNarrative, pointOfView, themes, recommendedPlatforms, contentHooks, createdAt, updatedAt]
      properties:
        id:
          type: integer
        clientId:
          type: integer
        industryAnswers:
          type: array
          items:
            $ref: "#/components/schemas/IndustryAnswer"
        coreNarrative:
          type: string
        pointOfView:
          type: string
        themes:
          type: array
          items:
            $ref: "#/components/schemas/NarrativeTheme"
        recommendedPlatforms:
          type: array
          items:
            $ref: "#/components/schemas/PlatformRecommendation"
        contentHooks:
          type: array
          items:
            type: string
        createdAt:
          type: string
        updatedAt:
          type: string

    NarrativeGenerateInput:
      type: object
      required: [answers]
      properties:
        answers:
          type: array
          items:
            $ref: "#/components/schemas/IndustryAnswer"

    Post:
      type: object
      required: [id, title, content, platform, status, createdAt, updatedAt]
      properties:
        id:
          type: integer
        title:
          type: string
        content:
          type: string
        platform:
          type: string
          enum: [linkedin, twitter, instagram, blog, other]
        status:
          type: string
          enum: [draft, scheduled, published]
        scheduledAt:
          type: ["string", "null"]
        tags:
          type: array
          items:
            type: string
        createdAt:
          type: string
        updatedAt:
          type: string

    PostInput:
      type: object
      required: [title, content, platform, status]
      properties:
        title:
          type: string
        content:
          type: string
        platform:
          type: string
          enum: [linkedin, twitter, instagram, blog, other]
        status:
          type: string
          enum: [draft, scheduled, published]
        scheduledAt:
          type: string
        tags:
          type: array
          items:
            type: string

    PostUpdate:
      type: object
      properties:
        title:
          type: string
        content:
          type: string
        platform:
          type: string
          enum: [linkedin, twitter, instagram, blog, other]
        status:
          type: string
          enum: [draft, scheduled, published]
        scheduledAt:
          type: string
        tags:
          type: array
          items:
            type: string

    Idea:
      type: object
      required: [id, title, notes, createdAt]
      properties:
        id:
          type: integer
        title:
          type: string
        notes:
          type: string
        platform:
          type: ["string", "null"]
        createdAt:
          type: string

    IdeaInput:
      type: object
      required: [title]
      properties:
        title:
          type: string
        notes:
          type: string
        platform:
          type: string

    IdeaUpdate:
      type: object
      properties:
        title:
          type: string
        notes:
          type: string
        platform:
          type: string

    DashboardSummary:
      type: object
      required: [clientName, onboardingComplete, auditComplete, narrativeComplete, totalPosts, draftCount, scheduledCount, publishedCount, ideaCount, postsByPlatform, recentPosts]
      properties:
        clientName:
          type: ["string", "null"]
        onboardingComplete:
          type: boolean
        auditComplete:
          type: boolean
        narrativeComplete:
          type: boolean
        seoScore:
          type: ["integer", "null"]
        geoScore:
          type: ["integer", "null"]
        totalPosts:
          type: integer
        draftCount:
          type: integer
        scheduledCount:
          type: integer
        publishedCount:
          type: integer
        ideaCount:
          type: integer
        postsByPlatform:
          type: array
          items:
            $ref: "#/components/schemas/PlatformCount"
        recentPosts:
          type: array
          items:
            $ref: "#/components/schemas/Post"

    PlatformCount:
      type: object
      required: [platform, count]
      properties:
        platform:
          type: string
        count:
          type: integer
