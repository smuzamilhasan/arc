            $ref: "#/components/schemas/PlannerAction"
        seen:
          type: boolean
        createdAt:
          type: string

    PlannerReply:
      type: object
      required: [userMessage, assistantMessage]
      properties:
        userMessage:
          $ref: "#/components/schemas/PlannerMessage"
        assistantMessage:
          $ref: "#/components/schemas/PlannerMessage"

    PlannerActionResult:
      type: object
      required: [action]
      properties:
        action:
          $ref: "#/components/schemas/PlannerAction"
        assistantMessage:
          oneOf:
            - $ref: "#/components/schemas/PlannerMessage"
            - type: "null"

    PlannerBatchResult:
      type: object
      required: [actions]
      properties:
        actions:
          type: array
          items:
            $ref: "#/components/schemas/PlannerAction"

    ScheduleBatchInput:
      type: object
      required: [postIds, startDate]
      properties:
        postIds:
          type: array
          items:
            type: integer
          description: Post IDs to schedule, in the order they should be laid out.
        startDate:
          type: string
          description: ISO date for the first post (YYYY-MM-DD).
        intervalDays:
          type: integer
          description: Days between consecutive posts. Defaults to 1.
        time:
          type: string
          description: Time of day in HH:MM (24h). Defaults to 09:00.
    Agency:
      type: object
      required: [id, name, ownerUserId, createdAt, updatedAt]
      properties:
        id:
          type: integer
        name:
          type: string
        ownerUserId:
          type: string
        createdAt:
          type: string
        updatedAt:
          type: string
    AgencyInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 120
    AgencyMembership:
      type: object
      required: [id, name, role]
      properties:
        id:
          type: integer
        name:
          type: string
        role:
          type: string
          enum: [owner, member]
    AgencyClientSummary:
      type: object
      required: [id, fullName, headline, onboardingComplete, claimed, isOwn, agencyId]
      properties:
        id:
          type: integer
        fullName:
          type: string
        headline:
          type: string
        onboardingComplete:
          type: boolean
        claimed:
          type: boolean
        isOwn:
          type: boolean
        agencyId:
          type: ["integer", "null"]
    AgencyContext:
      type: object
      required: [personalClientId, agencies, clients]
      properties:
        personalClientId:
          type: ["integer", "null"]
        agencies:
          type: array
          items:
            $ref: "#/components/schemas/AgencyMembership"
        clients:
          type: array
          items:
            $ref: "#/components/schemas/AgencyClientSummary"
    AgencyMemberInfo:
      type: object
      required: [userId, role, email, name]
      properties:
        userId:
          type: string
        role:
          type: string
          enum: [owner, member]
        email:
          type: ["string", "null"]
        name:
          type: ["string", "null"]
    AgencyMembersResponse:
      type: object
      required: [members]
      properties:
        members:
          type: array
          items:
            $ref: "#/components/schemas/AgencyMemberInfo"
    Invitation:
      type: object
      required: [id, agencyId, email, kind, clientId, token, status, createdAt]
      properties:
        id:
          type: integer
        agencyId:
          type: integer
        email:
          type: string
        kind:
          type: string
          enum: [member, client]
        clientId:
          type: ["integer", "null"]
        token:
          type: string
        status:
          type: string
          enum: [pending, accepted, revoked]
        createdAt:
          type: string
    CreateInvitationResult:
      type: object
      required: [id, agencyId, email, kind, clientId, token, status, createdAt, emailSent]
      properties:
        id:
          type: integer
        agencyId:
          type: integer
        email:
          type: string
        kind:
          type: string
          enum: [member, client]
        clientId:
          type: ["integer", "null"]
        token:
          type: string
        status:
          type: string
          enum: [pending, accepted, revoked]
        createdAt:
          type: string
        emailSent:
          type: boolean
          description: Whether the invite email was delivered. False means the owner should fall back to copying the invite link manually.
    InvitationListResponse:
      type: object
      required: [invitations]
      properties:
